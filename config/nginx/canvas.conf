# =============================================================================
  # Nginx Reverse Proxy Configuration for Canvas LMS
  # Place at: config/nginx/canvas.conf
  # Mounted into the nginx container at /etc/nginx/conf.d/canvas.conf
  # =============================================================================

  # Redirect all HTTP to HTTPS
  server {
      listen 80;
    server_name ${CANVAS_DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
              root /var/www/certbot;
}

    location / {
              return 301 https://$host$request_uri;
      }
      }

# HTTPS — main Canvas proxy
      server {
          listen 443 ssl http2;
    server_name ${CANVAS_DOMAIN};

    # SSL certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/${CANVAS_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${CANVAS_DOMAIN}/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-XSS-Protection          "1; mode=block"                       always;

    # Upload size limit (Canvas file uploads can be large)
    client_max_body_size 500m;

    # Timeouts for long-running requests (reports, exports, etc.)
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # Proxy to Canvas Puma/Passenger
    location / {
              proxy_pass         http://canvas:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
}

    # Serve compiled static assets directly (bypasses Rails)
    location /assets/ {
              root               /usr/src/app/public;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
}

    # Health check endpoint (no logging)
    location /health_check {
              proxy_pass         http://canvas:3000/health_check;
        access_log         off;
}
}
