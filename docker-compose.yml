version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  canvas:
    image: instructure/canvas-lms:${CANVAS_LMS_VERSION:-stable}
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      CANVAS_LMS_ADMIN_EMAIL: ${CANVAS_ADMIN_EMAIL}
      CANVAS_LMS_ADMIN_PASSWORD: ${CANVAS_ADMIN_PASSWORD}
      CANVAS_LMS_ACCOUNT_NAME: ${CANVAS_ADMIN_NAME}
      CANVAS_LMS_STATS_COLLECTION: opt_out
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY_BASE: ${CANVAS_SECRET_KEY_BASE}
    ports:
      - "3000:3000"
    volumes:
      - canvas_uploads:/usr/src/app/public/assets/uploads
      - ./config/database.yml:/usr/src/app/config/database.yml:ro
      - ./config/cache_store.yml:/usr/src/app/config/cache_store.yml:ro
      - ./config/outgoing_mail.yml:/usr/src/app/config/outgoing_mail.yml:ro
      - ./config/security.yml:/usr/src/app/config/security.yml:ro
      - ./config/dynamic_settings.yml:/usr/src/app/config/dynamic_settings.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health_check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  canvas-jobs:
    image: instructure/canvas-lms:${CANVAS_LMS_VERSION:-stable}
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY_BASE: ${CANVAS_SECRET_KEY_BASE}
    command: bundle exec script/delayed_job run
    volumes:
      - canvas_uploads:/usr/src/app/public/assets/uploads
      - ./config/database.yml:/usr/src/app/config/database.yml:ro
      - ./config/cache_store.yml:/usr/src/app/config/cache_store.yml:ro
      - ./config/outgoing_mail.yml:/usr/src/app/config/outgoing_mail.yml:ro
      - ./config/security.yml:/usr/src/app/config/security.yml:ro
      - ./config/dynamic_settings.yml:/usr/src/app/config/dynamic_settings.yml:ro
    depends_on:
      canvas:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/canvas.conf:/etc/nginx/conf.d/canvas.conf:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_www:/var/www/certbot
    depends_on:
      - canvas

volumes:
  postgres_data:
  redis_data:
  canvas_uploads:
  nginx_certs:
  nginx_www:
